name: Test Pipeline Migration

on:
  pull_request:
    branches:
      - dev

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
          echo "🔧 Rodando build... (alteração que vai dev com o migrate)"
          sleep 3

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy
        run: |
          echo "🚀 Rodando deploy... (alteração que vai dev com o migrate)"
          sleep 3 
  migrate:
    runs-on: ubuntu-latest
    needs: deploy
    if: contains(github.event.pull_request.title, '[run-migration]')

    steps:
      - name: Run Migration
        run: |
          echo "🗄️ Rodando migration... (alteração que vai dev com o migrate)"
          sleep 5




